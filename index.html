<script>
let cachedEmails = [];
let autoRefresh = null;
let lastEmailIds = new Set();
let messageCache = {};

function extractOTP(body) {
    const match = body.match(/\b\d{4,6}\b/);
    return match ? match[0] : null;
}

function showToast(message) {
    const toast = document.createElement("div");
    toast.className = "toast";
    toast.textContent = message;
    document.getElementById("toastContainer").appendChild(toast);
    setTimeout(() => toast.remove(), 4000);
}

function saveHistory(email) {
    let history = JSON.parse(localStorage.getItem("emailHistory") || "[]");
    if (!history.includes(email)) {
        history.unshift(email);
        if (history.length > 5) history.pop();
        localStorage.setItem("emailHistory", JSON.stringify(history));
    }
}

function loadHistory() {
    let history = JSON.parse(localStorage.getItem("emailHistory") || "[]");
    if (history.length) {
        const select = document.createElement("select");
        select.onchange = () => {
            document.getElementById('emailInput').value = select.value;
        };
        history.forEach(email => {
            const opt = document.createElement("option");
            opt.value = email;
            opt.textContent = email;
            select.appendChild(opt);
        });
        document.getElementById("emailForm").appendChild(select);
    }
}

async function createEmail() {
    const res = await fetch('/create_email', { method: 'POST' });
    const data = await res.json();
    document.getElementById('emailInput').value = data.email;
    saveHistory(data.email);
    startAutoRefresh();
}

function startAutoRefresh() {
    window.isAutoRefresh = true;
    if (autoRefresh) clearInterval(autoRefresh);
    autoRefresh = setInterval(() => {
        const email = document.getElementById('emailInput').value.trim();
        if (email) fetchEmails();
    }, 10000);
}

async function fetchEmails() {
    const email = document.getElementById('emailInput').value.trim().toLowerCase();
    if (!email.includes('@')) return;

    if (!window.isAutoRefresh) {
        document.getElementById('loading').style.display = "block";
    }

    try {
        const res = await fetch('/list_emails?email=' + encodeURIComponent(email));
        const data = await res.json();

        if (!data.error) {
            const newIds = new Set(data.map(mail => mail.id));
            for (let id of newIds) {
                if (!lastEmailIds.has(id)) {
                    showToast("\ud83d\udce7 Thư mới vừa đến!");
                    break;
                }
            }
            lastEmailIds = newIds;
            cachedEmails = data;
        }
    } catch {}
    document.getElementById('loading').style.display = "none";

    const emailList = document.getElementById('emailList');
    emailList.innerHTML = cachedEmails.length === 0
        ? "<p style='text-align:center;'>Không có thư nào hoặc lỗi.</p>"
        : cachedEmails.map((mail, index) => `
            <div class="email-item" onclick="showPopup(${index})">
                <strong>${mail.subject}</strong>
                <small>From: ${mail.from}<br>Date: ${mail.date}</small>
            </div>
        `).join('');
}

document.getElementById('refreshBtn').addEventListener('click', () => {
    window.isAutoRefresh = false;
    fetchEmails();
});

document.getElementById('createBtn').addEventListener('click', createEmail);

document.getElementById('copyBtn').addEventListener('click', async function() {
    const email = document.getElementById('emailInput').value.trim();
    const copyBtn = document.getElementById('copyBtn');
    if (!email) return;

    try {
        await navigator.clipboard.writeText(email);
        copyBtn.innerHTML = "✅";
        setTimeout(() => copyBtn.innerHTML = "📋", 2000);
    } catch {
        copyBtn.innerHTML = "❌";
        setTimeout(() => copyBtn.innerHTML = "📋", 2000);
    }
});

function showPopup(index) {
    const mail = cachedEmails[index];
    const otp = extractOTP(mail.body);
    const sanitizedBody = mail.body.replace(/<a\s/gi, '<a target="_blank" ');

    document.getElementById('popupBody').innerHTML = `
        <h2 style="color:#4CAF50;">${mail.subject}</h2>
        <p><strong>From:</strong> ${mail.from}</p>
        <p><strong>Date:</strong> ${mail.date}</p>
        ${otp ? `<p style="font-size:20px;color:#e91e63;"><strong>Mã OTP:</strong> ${otp}</p>` : ""}
        <hr>
        <div style="max-height:400px;overflow:auto;border:1px solid #ccc;padding:10px;">${sanitizedBody}</div>
    `;
    document.getElementById('popupOverlay').style.display = "flex";
}

function closePopup() {
    document.getElementById('popupOverlay').style.display = "none";
}

function handleOverlayClick(event) {
    const popupContent = document.getElementById('popupContent');
    if (!popupContent.contains(event.target)) {
        closePopup();
    }
}

window.onload = loadHistory;
</script>
